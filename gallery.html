<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE HOLLER — Plates</title>
<meta name="description" content="Images from the development of The Holler." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="masthead">
  <div class="masthead-inner">
    <div class="brand">
      <span class="brand-mark">▚</span>
      <span class="brand-text">
        <span class="brand-title">THE&nbsp;HOLLER</span>
        <span class="brand-sub">field development log</span>
      </span>
    </div>
    <nav class="tabs" aria-label="Sections">
      <a href="index.html" class="tab">Log</a>
      <a href="gallery.html" class="tab tab--active" aria-current="page">Plates</a>
    </nav>
  </div>
  <div class="masthead-strip" aria-hidden="true">
    <span>AWRI&nbsp;//&nbsp;GREENBRIER&nbsp;VALLEY</span>
    <span>38.2°N</span>
    <span>PLATE&nbsp;ARCHIVE</span>
    <span>SOLO&nbsp;BUILD</span>
  </div>
</header>

<main class="plates">

  <!-- ============================================================= -->
  <!-- Add a plate: drop an image in /images and copy a figure block. -->
  <!-- Keep newest first if you want; order is up to you.            -->
  <!-- ============================================================= -->

  <figure class="plate plate--empty">
    <div class="plate-frame">
      <img src="images/map.png" alt="Early version of the map">
    </div>
    <figcaption>
      <span class="plate-id">001</span>
      <span class="plate-cap">Heres the early version of the map.</span>
    </figcaption>
  </figure>

  <figure class="plate plate--empty">
    <div class="plate-frame">
      <img src="images/base.png" alt="Early version of the base">
    </div>
    <figcaption>
      <span class="plate-id">002</span>
      <span class="plate-cap">The Early Base. Nothing crazy, just a box with a door and window. Also pictured is the early UTV and a trail camera on the left side.</span>
    </figcaption>
  </figure>

  <figure class="plate plate--empty">
    <div class="plate-frame">
      <img src="images/utv.png" alt="Early version of the UTV">
    </div>
    <figcaption>
      <span class="plate-id">003</span>
      <span class="plate-cap">This is the first model of the UTV, proportions are correct, detail is not.</span>
    </figcaption>
  </figure>

  <!-- Example of a REAL plate once you add an image (uncomment & edit):

  <figure class="plate">
    <div class="plate-frame">
      <img src="images/greenbrier-hillshade.png" alt="Hillshade render of the Greenbrier valley terrain." loading="lazy" />
    </div>
    <figcaption>
      <span class="plate-id">004</span>
      <span class="plate-cap">Greenbrier valley, rebuilt from USGS elevation data.</span>
    </figcaption>
  </figure>

  -->

</main>

<footer class="foot">
  <span>The Holler — built in the open.</span>
  <span class="foot-coords">N&nbsp;38.2°&nbsp;·&nbsp;W&nbsp;80.2°</span>
</footer>

</body>
</html>
